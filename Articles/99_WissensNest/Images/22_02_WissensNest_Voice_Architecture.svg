  <line x1="460" y1="130" x2="244" y2="245" stroke="rgb(180,95,20)" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="330" y="176" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">WAV bytes</text>

  <!-- VoiceClient → whisper.cpp -->
  <line x1="656" y1="252" x2="620" y2="115" stroke="rgb(20,130,130)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="626" y="190" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">WAV POST</text>

  <!-- VoiceClient → WissensNest.API -->
  <line x1="656" y1="260" x2="620" y2="260" stroke="rgb(83,74,183)" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="625" y="253" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">chat req</text>

