  <text x="357" y="430" text-anchor="middle" fill="rgb(8,80,65)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">SQLite</text>
  <text x="357" y="446" text-anchor="middle" fill="rgb(15,110,86)" font-family="-apple-system,system-ui,sans-serif" font-size="10">conversations · messages</text>
  <text x="357" y="458" text-anchor="middle" fill="rgb(25,130,100)" font-family="-apple-system,system-ui,sans-serif" font-size="9">projects · prompts</text>

