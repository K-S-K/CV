  <text x="532" y="430" text-anchor="middle" fill="rgb(80,30,140)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">WissensNest.Tools</text>
  <text x="532" y="446" text-anchor="middle" fill="rgb(110,50,180)" font-family="-apple-system,system-ui,sans-serif" font-size="10">ITool — web, weather, time</text>
  <text x="532" y="458" text-anchor="middle" fill="rgb(130,70,200)" font-family="-apple-system,system-ui,sans-serif" font-size="9">HomeControl (planned)</text>

  <!-- Internal center arrows -->
