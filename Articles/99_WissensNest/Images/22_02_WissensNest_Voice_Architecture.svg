  <line x1="620" y1="130" x2="656" y2="400" stroke="rgb(180,95,20)" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="640" y="270" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">WAV bytes</text>

  <!-- API → both paths (SSE stream) -->
  <line x1="280" y1="260" x2="244" y2="260" stroke="rgb(83,74,183)" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="620" y1="262" x2="656" y2="262" stroke="rgb(83,74,183)" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Legend -->
  <text x="24" y="508" fill="rgb(80,80,75)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="600">Legend:</text>
  <line x1="100" y1="505" x2="150" y2="505" stroke="rgb(95,94,90)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="155" y="509" fill="rgb(80,80,75)" font-family="-apple-system,system-ui,sans-serif" font-size="9">data flow (sync)</text>
  <line x1="240" y1="505" x2="280" y2="505" stroke="rgb(95,94,90)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="285" y="509" fill="rgb(80,80,75)" font-family="-apple-system,system-ui,sans-serif" font-size="9">data flow (async/stream)</text>
  <text x="460" y="509" fill="rgb(130,130,125)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Both paths call the same whisper.cpp, Piper, and WissensNest.API instances.</text>
