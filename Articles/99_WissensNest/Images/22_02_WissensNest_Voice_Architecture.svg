  <text x="766" y="249" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">VoiceClient.cs</text>
  <text x="766" y="265" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10">WissensNest.VoiceClient</text>
  <text x="766" y="276" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="9">.NET Console · orchestrates loop</text>

  <line x1="766" y1="132" x2="766" y2="154" stroke="rgb(40,100,180)" stroke-width="1.1" marker-end="url(#arr)"/>
  <line x1="766" y1="206" x2="766" y2="228" stroke="rgb(110,50,180)" stroke-width="1.1" marker-end="url(#arr)"/>
