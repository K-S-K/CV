  <!-- ════════════════════════════════ -->
  <rect x="268" y="48" width="364" height="430" rx="10" fill="rgb(252,252,250)" stroke="rgba(60,52,137,0.35)" stroke-width="1.2" stroke-dasharray="7 4"/>
