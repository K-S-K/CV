  <text x="766" y="191" text-anchor="middle" fill="rgb(110,50,180)" font-family="-apple-system,system-ui,sans-serif" font-size="10">openWakeWord — HTTP API</text>
  <text x="766" y="202" text-anchor="middle" fill="rgb(130,70,200)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Approach C only (always-on)</text>

