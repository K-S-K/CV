  <rect x="280" y="228" width="340" height="70" rx="7" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1.2"/>
  <text x="450" y="252" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="600">WissensNest.API</text>
  <text x="450" y="270" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10">POST /chat/stream · ChatService · ToolOrchestrator</text>
  <text x="450" y="284" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Streaming SSE · conversation history · IWissensNestClient</text>

