  <line x1="540" y1="228" x2="540" y2="156" stroke="rgb(180,95,20)" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="548" y="200" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">text in</text>
  <line x1="450" y1="298" x2="450" y2="322" stroke="rgb(83,74,183)" stroke-width="1.1" marker-end="url(#arr)"/>
  <line x1="430" y1="388" x2="390" y2="408" stroke="rgb(83,74,183)" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="470" y1="388" x2="510" y2="408" stroke="rgb(110,50,180)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ════════════════════════ -->
  <!-- CROSS-PATH ARROWS       -->
  <!-- ════════════════════════ -->

  <!-- VoiceService → whisper.cpp -->
  <line x1="244" y1="248" x2="280" y2="115" stroke="rgb(20,130,130)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="248" y="186" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">WAV POST</text>

