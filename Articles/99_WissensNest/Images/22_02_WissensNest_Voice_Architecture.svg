<svg width="100%" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="20" text-anchor="middle" fill="rgb(35,35,33)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600">WissensNest — Voice Layer Architecture</text>
  <text x="450" y="36" text-anchor="middle" fill="rgb(120,120,115)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Two client paths share the same MacBook services</text>

  <!-- ════════════════════════════ -->
  <!-- PATH A: Blazor UI (left)    -->
  <!-- ════════════════════════════ -->
  <rect x="10" y="48" width="248" height="430" rx="10" fill="rgb(245,244,255)" stroke="rgb(83,74,183)" stroke-width="0.9" stroke-dasharray="6 3"/>
  <text x="134" y="64" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.8">APPROACH A — BLAZOR UI</text>

  <!-- Browser -->
  <rect x="24" y="74" width="220" height="58" rx="7" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="1"/>
  <text x="134" y="97" text-anchor="middle" fill="rgb(68,68,65)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">Browser / Mobile App</text>
  <text x="134" y="114" text-anchor="middle" fill="rgb(95,94,90)" font-family="-apple-system,system-ui,sans-serif" font-size="10">MediaRecorder API · AudioContext</text>
  <text x="134" y="125" text-anchor="middle" fill="rgb(115,114,108)" font-family="-apple-system,system-ui,sans-serif" font-size="9">mic capture · audio playback</text>

  <!-- JS voice layer -->
  <rect x="24" y="154" width="220" height="52" rx="7" fill="rgb(255,251,220)" stroke="rgb(155,125,20)" stroke-width="1"/>
  <text x="134" y="175" text-anchor="middle" fill="rgb(100,80,10)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">wwwroot/js/voice.js</text>
  <text x="134" y="191" text-anchor="middle" fill="rgb(140,115,20)" font-family="-apple-system,system-ui,sans-serif" font-size="10">MediaRecorder · Blob → base64</text>
  <text x="134" y="202" text-anchor="middle" fill="rgb(155,125,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">JS interop bridge</text>

  <!-- VoiceService.cs -->
  <rect x="24" y="228" width="220" height="52" rx="7" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="134" y="249" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">VoiceService.cs</text>
  <text x="134" y="265" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10">WissensNest.UI/Services</text>
  <text x="134" y="276" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="9">circuit-scoped · IJSRuntime inject</text>

