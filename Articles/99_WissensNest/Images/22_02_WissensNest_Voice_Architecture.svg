  <rect x="460" y="74" width="160" height="82" rx="7" fill="rgb(255,243,225)" stroke="rgb(180,95,20)" stroke-width="1.2"/>
  <text x="540" y="99" text-anchor="middle" fill="rgb(130,65,10)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="600">Piper TTS</text>
  <text x="540" y="117" text-anchor="middle" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="11">TTS · HTTP :5002</text>
  <text x="540" y="132" text-anchor="middle" fill="rgb(200,110,30)" font-family="-apple-system,system-ui,sans-serif" font-size="9.5">POST /api/tts</text>
