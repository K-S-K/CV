  <!-- VoiceService → Chat.razor (local) -->
  <rect x="24" y="374" width="220" height="52" rx="7" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="134" y="396" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">Chat.razor</text>
  <text x="134" y="412" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10">transcript → chat input</text>
  <text x="134" y="423" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="9">auto-send · TTS plays response</text>

  <line x1="134" y1="280" x2="134" y2="374" stroke="rgb(83,74,183)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="143" y="330" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">transcript</text>

