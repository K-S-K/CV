  <!-- ════════════════════════════ -->
  <rect x="642" y="48" width="248" height="430" rx="10" fill="rgb(242,248,255)" stroke="rgb(40,100,180)" stroke-width="0.9" stroke-dasharray="6 3"/>
  <text x="766" y="64" text-anchor="middle" fill="rgb(20,70,140)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.8">APPROACH B/C — HEADLESS</text>

