  <text x="360" y="132" text-anchor="middle" fill="rgb(30,150,150)" font-family="-apple-system,system-ui,sans-serif" font-size="9.5">POST /inference</text>
  <text x="360" y="147" text-anchor="middle" fill="rgb(40,160,155)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Metal · large-v3</text>

