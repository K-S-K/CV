<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="-apple-system,system-ui,sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- diamond shape for decision -->
    <polygon id="diamond" points="0,-22 36,0 0,22 -36,0" />
  </defs>

  <rect width="700" height="340" fill="#f8f9fb" rx="10"/>
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">
    NavigationHistoryService — User navigates normally
  </text>

  <!-- ── Step 1: Event fires ─────────────────────────────── -->
  <!-- rounded rect: event -->
  <rect x="225" y="40" width="250" height="38" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="63" text-anchor="middle" font-size="12" fill="#1e3a5f">
    LocationChanged fires
  </text>

  <!-- arrow down -->
  <line x1="350" y1="78" x2="350" y2="104" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- ── Decision: _navigating? ────────────────────────── -->
  <g transform="translate(350,128)">
    <polygon points="0,-24 90,0 0,24 -90,0"
             fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#713f12">_navigating?</text>
  </g>

  <!-- "no" label + arrow down -->
  <text x="362" y="162" font-size="10" fill="#6b7280">no</text>
  <line x1="350" y1="152" x2="350" y2="178" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- "yes" branch — arrow right to early-exit box -->
  <text x="446" y="124" font-size="10" fill="#6b7280">yes</text>
  <line x1="440" y1="128" x2="560" y2="128" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <rect x="560" y="108" width="112" height="40" rx="7"
        fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="616" y="124" text-anchor="middle" font-size="10" fill="#7f1d1d">skip push</text>
  <text x="616" y="138" text-anchor="middle" font-size="10" fill="#7f1d1d">(own navigation)</text>

  <!-- ── Step 2: push _currentUri ─────────────────────── -->
  <rect x="225" y="178" width="250" height="38" rx="7"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="350" y="201" text-anchor="middle" font-size="12" fill="#064e3b">
    _back.Push(_currentUri)
  </text>

  <!-- arrow -->
  <line x1="350" y1="216" x2="350" y2="238" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- ── Step 3: clear forward ─────────────────────────── -->
  <rect x="225" y="238" width="250" height="38" rx="7"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="350" y="261" text-anchor="middle" font-size="12" fill="#064e3b">
    _forward.Clear()
  </text>

  <!-- arrow -->
  <line x1="350" y1="276" x2="350" y2="298" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- ── Step 4: update + notify ─────────────────────── -->
  <rect x="185" y="298" width="330" height="34" rx="5"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="350" y="319" text-anchor="middle" font-size="10" fill="#3b0764">
    _currentUri = new URL  ·  OnChange?.Invoke()
  </text>

</svg>
