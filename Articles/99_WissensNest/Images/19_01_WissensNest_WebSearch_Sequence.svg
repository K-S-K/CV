<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="ui-sans-serif, system-ui, sans-serif">

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#444"/>
    </marker>
    <marker id="ah-org" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#ca6f1e"/>
    </marker>
    <marker id="ah-pur" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#7d3c98"/>
    </marker>
    <marker id="ah-gry" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="560" fill="#f4f6f9" rx="10"/>

  <!-- title -->
  <text x="450" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">WebSearchTool — Execution Sequence</text>

  <!-- ===== ACTOR BOXES (centers: 80, 265, 570, 800) ===== -->

  <rect x="15"  y="36" width="130" height="36" rx="6" fill="#5c6bc0" stroke="#3949ab" stroke-width="1.5"/>
  <text x="80"  y="59" text-anchor="middle" font-size="11" font-weight="600" fill="white">ToolOrchestrator</text>

  <rect x="200" y="36" width="130" height="36" rx="6" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="265" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="white">WebSearch</text>
  <text x="265" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="white">Tool</text>

  <rect x="492" y="36" width="156" height="36" rx="6" fill="#ca6f1e" stroke="#a04000" stroke-width="1.5"/>
  <text x="570" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="white">DuckDuckGo</text>
  <text x="570" y="67" text-anchor="middle" font-size="9.5" font-weight="600" fill="white">html.duckduckgo.com</text>

  <rect x="737" y="36" width="128" height="36" rx="6" fill="#8e44ad" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="801" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="white">AngleSharp</text>
  <text x="801" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="white">HTML Parser</text>

  <!-- ===== LIFELINES ===== -->
  <line x1="80"  y1="72" x2="80"  y2="495" stroke="#bbc" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="265" y1="72" x2="265" y2="495" stroke="#bbc" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="570" y1="72" x2="570" y2="495" stroke="#bbc" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="801" y1="72" x2="801" y2="495" stroke="#bbc" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Step 1: ToolOrchestrator → WebSearchTool -->
  <line x1="87"  y1="103" x2="257" y2="103" stroke="#444" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="172" y="97" text-anchor="middle" font-size="9.5" fill="#333">ExecuteAsync(inputJson)</text>

  <!-- Step 2: Parse (internal) -->
  <rect x="200" y="114" width="226" height="22" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="313" y="129" text-anchor="middle" font-size="9.5" fill="#6d4c00">parse query + max_results from JSON</text>

  <!-- Step 3: GET request → DuckDuckGo -->
  <line x1="272" y1="160" x2="562" y2="160" stroke="#ca6f1e" stroke-width="1.5" marker-end="url(#ah-org)"/>
  <text x="417" y="154" text-anchor="middle" font-size="9.5" fill="#a04000">GET html/?q={url-encoded}&amp;kl=wt-wt</text>
  <text x="417" y="173" text-anchor="middle" font-size="8.5" fill="#a04000">User-Agent: Mozilla/5.0 … Chrome/124 …</text>

  <!-- Step 4: DuckDuckGo response -->
  <line x1="563" y1="195" x2="273" y2="195" stroke="#ca6f1e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-org)"/>
  <text x="417" y="189" text-anchor="middle" font-size="9.5" fill="#a04000">200 OK · text/html · ~50 KB HTML body</text>

  <!-- Step 5: → AngleSharp -->
  <line x1="272" y1="221" x2="793" y2="221" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#ah-pur)"/>
  <text x="530" y="215" text-anchor="middle" font-size="9.5" fill="#6c3483">BrowsingContext.OpenAsync(req &#x21D2; req.Content(html))</text>

  <!-- Step 6: AngleSharp → back -->
  <line x1="794" y1="244" x2="273" y2="244" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-pur)"/>
  <text x="530" y="238" text-anchor="middle" font-size="9.5" fill="#6c3483">IDocument — parsed DOM tree</text>

  <!-- For-each loop box -->
  <rect x="202" y="258" width="658" height="145" rx="5" fill="rgba(142,68,173,0.04)" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="202" y="258" width="44" height="17" rx="3" fill="#8e44ad"/>
  <text x="224" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="white">for N</text>
  <text x="258" y="270" font-size="9" font-style="italic" fill="#6c3483">  each .result__body, up to max_results</text>

  <rect x="212" y="281" width="318" height="22" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="371" y="296" text-anchor="middle" font-size="9.5" fill="#6d4c00">QuerySelector(".result__a") &#x2192; title text + href</text>

  <rect x="212" y="311" width="318" height="22" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="371" y="326" text-anchor="middle" font-size="9.5" fill="#6d4c00">QuerySelector(".result__snippet") &#x2192; snippet text</text>

  <rect x="212" y="341" width="318" height="22" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="371" y="356" text-anchor="middle" font-size="9.5" fill="#6d4c00">ExtractUrl(href): parse uddg param &#x2192; URL-decode</text>

  <rect x="212" y="371" width="318" height="22" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="371" y="386" text-anchor="middle" font-size="9.5" fill="#6d4c00">collect SearchResult(title, snippet, url) into list</text>

  <!-- FormatResults (after loop) -->
  <rect x="202" y="415" width="240" height="22" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="322" y="430" text-anchor="middle" font-size="9.5" fill="#6d4c00">FormatResults &#x2192; numbered plain-text string</text>

  <!-- Return to ToolOrchestrator -->
  <line x1="258" y1="454" x2="88"  y2="454" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-gry)"/>
  <text x="172" y="448" text-anchor="middle" font-size="9.5" fill="#555">return plain-text result</text>

  <!-- ===== LEGEND ===== -->
  <rect x="17" y="473" width="866" height="44" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>

  <line x1="30"  y1="496" x2="55"  y2="496" stroke="#444" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="63"   y="500" font-size="9" fill="#444">Call</text>

  <line x1="105" y1="496" x2="130" y2="496" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-gry)"/>
  <text x="138"  y="500" font-size="9" fill="#444">Return</text>

  <line x1="195" y1="496" x2="220" y2="496" stroke="#ca6f1e" stroke-width="1.5" marker-end="url(#ah-org)"/>
  <text x="228"  y="500" font-size="9" fill="#444">HTTP request</text>

  <line x1="315" y1="496" x2="340" y2="496" stroke="#ca6f1e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-org)"/>
  <text x="348"  y="500" font-size="9" fill="#444">HTTP response</text>

  <line x1="440" y1="496" x2="465" y2="496" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#ah-pur)"/>
  <text x="473"  y="500" font-size="9" fill="#444">AngleSharp call / return</text>

  <rect x="612" y="490" width="12" height="12" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="632"  y="500" font-size="9" fill="#444">Internal step</text>

  <rect x="720" y="490" width="14" height="12" fill="rgba(142,68,173,0.04)" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="742"  y="500" font-size="9" fill="#444">Iteration</text>

</svg>
