<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 770 490" font-family="-apple-system,system-ui,sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="770" height="490" fill="#f8f9fb" rx="10"/>
  <text x="385" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">
    NavigationHistoryService — GoBack()
  </text>

  <!-- ════════════════════════════════════════════
       LEFT COLUMN — GoBack() call site
  ════════════════════════════════════════════════ -->

  <!-- Trigger -->
  <rect x="30" y="40" width="240" height="38" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="63" text-anchor="middle" font-size="12" fill="#1e3a5f">
    User clicks ← button
  </text>

  <line x1="150" y1="78" x2="150" y2="100" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="30" y="100" width="240" height="38" rx="7"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="123" text-anchor="middle" font-size="12" fill="#064e3b">
    _forward.Push(_currentUri)
  </text>

  <line x1="150" y1="138" x2="150" y2="160" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="30" y="160" width="240" height="38" rx="7"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="183" text-anchor="middle" font-size="12" fill="#064e3b">
    target = _back.Pop()
  </text>

  <line x1="150" y1="198" x2="150" y2="220" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Step 3: set flag -->
  <rect x="30" y="220" width="240" height="38" rx="7"
        fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="150" y="243" text-anchor="middle" font-size="12" fill="#713f12">
    _navigating = true
  </text>

  <line x1="150" y1="258" x2="150" y2="280" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Step 4: navigate -->
  <rect x="30" y="280" width="240" height="38" rx="7"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="303" text-anchor="middle" font-size="12" fill="#064e3b">
    NavigateTo(target)
  </text>

  <!-- Cross-boundary arrow: NavigateTo triggers LocationChanged -->
  <!-- horizontal to right column -->
  <line x1="270" y1="299" x2="438" y2="299" stroke="#7c3aed" stroke-width="1.5"
        stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="354" y="292" text-anchor="middle" font-size="9" fill="#7c3aed">triggers</text>

  <!-- ════════════════════════════════════════════
       RIGHT COLUMN — LocationChanged handler
  ════════════════════════════════════════════════ -->

  <!-- Header label -->
  <rect x="438" y="270" width="292" height="20" rx="4"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="584" y="284" text-anchor="middle" font-size="10" font-weight="600" fill="#4c1d95">
    OnLocationChanged handler
  </text>

  <!-- Decision: _navigating? -->
  <g transform="translate(584,330)">
    <polygon points="0,-24 100,0 0,24 -100,0"
             fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#713f12">_navigating?</text>
  </g>

  <line x1="584" y1="299" x2="584" y2="306" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- "yes" branch — arrow down into the clear+update box -->
  <text x="596" y="362" font-size="10" fill="#6b7280">yes</text>
  <line x1="584" y1="354" x2="584" y2="376" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- "no" branch — arrow right to skip box -->
  <text x="690" y="327" font-size="10" fill="#6b7280">no</text>
  <line x1="684" y1="330" x2="730" y2="330" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <rect x="730" y="310" width="20" height="40" rx="3"
        fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Step: clear flag + update + notify -->
  <rect x="440" y="376" width="290" height="56" rx="7"
        fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="585" y="396" text-anchor="middle" font-size="12" fill="#064e3b">
    _navigating = false
  </text>
  <text x="585" y="414" text-anchor="middle" font-size="12" fill="#064e3b">
    _currentUri = target
  </text>
  <line x1="585" y1="433" x2="585" y2="448" stroke="#6b7280" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <rect x="490" y="448" width="190" height="28" rx="4"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="585" y="465" text-anchor="middle" font-size="9" fill="#3b0764">
    OnChange?.Invoke()  →  ribbon re-renders
  </text>

  <!-- ── Legend ───────────────────────────────────────────── -->
  <rect x="30" y="400" width="240" height="60" rx="6"
        fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="150" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">Result</text>
  <text x="150" y="434" text-anchor="middle" font-size="10" fill="#475569">← stack: popped target removed</text>
  <text x="150" y="448" text-anchor="middle" font-size="10" fill="#475569">→ stack: current URL pushed</text>

</svg>
