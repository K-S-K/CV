<svg width="100%" viewBox="0 0 820 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════ SERVER BOX ═══════════════════════════ -->
  <rect x="10" y="50" width="255" height="370" rx="12" fill="rgb(252,252,255)" stroke="rgb(83,74,183)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="137" y="42" text-anchor="middle" fill="rgb(61,61,58)" font-family="-apple-system,system-ui,sans-serif" font-size="12">MacBook Pro M3 · Server</text>

  <!-- Blazor UI -->
  <rect x="24" y="60" width="227" height="55" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="137" y="82" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="500">WissensNest.UI</text>
  <text x="137" y="100" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Blazor Server</text>

  <!-- Blazor → API arrow (localhost) -->
  <line x1="80" y1="115" x2="80" y2="137" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="93" y="131" fill="rgb(115,114,108)" font-family="-apple-system,system-ui,sans-serif" font-size="10">localhost HTTP</text>

  <!-- API -->
  <rect x="24" y="137" width="227" height="55" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="137" y="159" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="500">WissensNest.API</text>
  <text x="137" y="177" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Minimal API · streaming</text>

  <!-- API → Ollama arrow -->
  <line x1="76" y1="192" x2="76" y2="228" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <!-- API → SQLite arrow -->
  <line x1="196" y1="192" x2="196" y2="228" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Ollama + LLM weights -->
  <rect x="24" y="228" width="103" height="72" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="75" y="258" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500">Ollama</text>
  <text x="75" y="277" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-family="-apple-system,system-ui,sans-serif" font-size="11">+ LLM weights</text>

  <!-- SQLite -->
  <rect x="139" y="228" width="112" height="72" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="195" y="258" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500">SQLite</text>
  <text x="195" y="277" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Database</text>

  <!-- Note inside server box -->
  <text x="137" y="326" text-anchor="middle" fill="rgb(130,128,125)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-style="italic">API, model, and database stay on localhost.</text>
  <text x="137" y="342" text-anchor="middle" fill="rgb(130,128,125)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-style="italic">Browsers never reach them directly.</text>
  <text x="137" y="358" text-anchor="middle" fill="rgb(130,128,125)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-style="italic">Only port 4001 is exposed.</text>
  <text x="137" y="393" text-anchor="middle" fill="rgb(130,128,125)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Change one line in prod-execute.sh:</text>
  <text x="137" y="409" text-anchor="middle" fill="rgb(99,56,6)" font-family="SFMono-Regular,Consolas,monospace" font-size="10">WISSENSNEST_SITE_URL=http://*:4001</text>

  <!-- ═══════════════════════════ NETWORK CONNECTIONS ═══════════════ -->

  <!-- Horizontal exit from server box right edge at Blazor UI center (y=87) -->
  <line x1="265" y1="87" x2="400" y2="87" stroke="rgb(83,74,183)" stroke-width="1.5" fill="none"/>

  <!-- Vertical backbone x=400, from y=87 down to y=360 -->
  <line x1="400" y1="87" x2="400" y2="360" stroke="rgb(83,74,183)" stroke-width="1.5" fill="none"/>

  <!-- Branch to Mac 1: (400, 130) → (540, 130) -->
  <line x1="400" y1="130" x2="540" y2="130" stroke="rgb(83,74,183)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="470" y="122" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10">circuit 1</text>

  <!-- Branch to Mac 2: (400, 360) → (540, 360) -->
  <line x1="400" y1="360" x2="540" y2="360" stroke="rgb(83,74,183)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="470" y="352" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10">circuit 2</text>

  <!-- Connection label above the horizontal exit -->
  <text x="323" y="77" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="500">HTTP + SignalR · port 4001</text>

  <!-- ═══════════════════════════ HOME NETWORK LABEL ════════════════ -->

  <!-- Wi-Fi icon centered at (400, 205) -->
  <circle cx="400" cy="216" r="4" fill="rgb(15,110,86)" stroke="none"/>
  <path d="M 385 213 A 15 15 0 0 1 415 213" fill="none" stroke="rgb(15,110,86)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 374 204 A 27 27 0 0 1 426 204" fill="none" stroke="rgb(15,110,86)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 363 195 A 38 38 0 0 1 437 195" fill="none" stroke="rgb(15,110,86)" stroke-width="1.5" stroke-linecap="round"/>

  <text x="400" y="242" text-anchor="middle" fill="rgb(15,110,86)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="500">Home Network</text>
  <text x="400" y="258" text-anchor="middle" fill="rgb(95,94,90)" font-family="-apple-system,system-ui,sans-serif" font-size="11">(same Wi-Fi)</text>

  <!-- ═══════════════════════════ FAMILY MACBOOKS ══════════════════ -->

  <!-- Family MacBook 1 -->
  <rect x="540" y="90" width="200" height="80" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="640" y="122" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="500">Family MacBook 1</text>
  <text x="640" y="143" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Browser only · no install</text>

  <!-- Family MacBook 2 -->
  <rect x="540" y="320" width="200" height="80" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="640" y="352" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="500">Family MacBook 2</text>
  <text x="640" y="373" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Browser only · no install</text>

  <!-- ═══════════════════════════ LEGEND ════════════════════════════ -->
  <rect x="10" y="462" width="14" height="14" rx="3" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="30" y="473" fill="rgb(61,61,58)" font-family="-apple-system,system-ui,sans-serif" font-size="12">UI &amp; API (server-side)</text>

  <rect x="195" y="462" width="14" height="14" rx="3" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="215" y="473" fill="rgb(61,61,58)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Ollama runtime</text>

  <rect x="345" y="462" width="14" height="14" rx="3" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="365" y="473" fill="rgb(61,61,58)" font-family="-apple-system,system-ui,sans-serif" font-size="12">persistence</text>

  <rect x="465" y="462" width="14" height="14" rx="3" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="485" y="473" fill="rgb(61,61,58)" font-family="-apple-system,system-ui,sans-serif" font-size="12">browser clients (no installation required)</text>
</svg>
