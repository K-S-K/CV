  <rect x="20"  y="116" width="185" height="72" rx="6" fill="#ca6f1e" stroke="#a04000" stroke-width="1.5"/>
  <text x="112" y="138" text-anchor="middle" font-size="10" font-weight="700" fill="white">② HTTP GET</text>
