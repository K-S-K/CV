  <text x="220" y="155" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#5d2e00">Host: html.duckduckgo.com</text>
  <text x="220" y="172" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#5d2e00">User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 …</text>

