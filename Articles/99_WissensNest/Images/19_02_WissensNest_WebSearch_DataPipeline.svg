  <text x="220" y="447" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#0a4035">uddg:     "https%3A%2F%2Fen.wikipedia.org%2Fwiki%2FCharles_Darwin"</text>
  <text x="220" y="466" font-family="'Courier New', Courier, monospace" font-size="10" font-weight="700" fill="#0a4035">decoded:  "https://en.wikipedia.org/wiki/Charles_Darwin"</text>

