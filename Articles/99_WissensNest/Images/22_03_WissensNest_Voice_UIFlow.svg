<svg width="100%" viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="18" text-anchor="middle" fill="rgb(35,35,33)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600">Approach A — Voice Input/Output in Blazor UI</text>

  <!-- ════════════ PARTICIPANT HEADERS ════════════ -->
  <!-- Column centers: 80, 210, 340, 470, 600, 730, 830  -->
  <!-- widths: 130 each, gap 10 -->

  <!-- Browser -->
  <rect x="15" y="28" width="130" height="52" rx="7" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="1.1"/>
  <text x="80" y="50" text-anchor="middle" fill="rgb(68,68,65)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Browser</text>
  <text x="80" y="66" text-anchor="middle" fill="rgb(95,94,90)" font-family="-apple-system,system-ui,sans-serif" font-size="9">MediaRecorder</text>
  <text x="80" y="75" text-anchor="middle" fill="rgb(95,94,90)" font-family="-apple-system,system-ui,sans-serif" font-size="9">AudioContext</text>

  <!-- voice.js -->
  <rect x="155" y="28" width="110" height="52" rx="7" fill="rgb(255,251,220)" stroke="rgb(155,125,20)" stroke-width="1.1"/>
  <text x="210" y="50" text-anchor="middle" fill="rgb(100,80,10)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">voice.js</text>
  <text x="210" y="66" text-anchor="middle" fill="rgb(140,115,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">JS interop</text>
  <text x="210" y="75" text-anchor="middle" fill="rgb(155,125,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">blob → bytes</text>

  <!-- VoiceService.cs -->
  <rect x="275" y="28" width="130" height="52" rx="7" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1.1"/>
  <text x="340" y="50" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">VoiceService.cs</text>
  <text x="340" y="66" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Blazor circuit</text>
  <text x="340" y="75" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">scoped service</text>

  <!-- whisper.cpp -->
  <rect x="415" y="28" width="130" height="52" rx="7" fill="rgb(220,245,245)" stroke="rgb(20,130,130)" stroke-width="1.1"/>
  <text x="480" y="50" text-anchor="middle" fill="rgb(10,90,90)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">whisper.cpp</text>
  <text x="480" y="66" text-anchor="middle" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">HTTP :9000</text>
  <text x="480" y="75" text-anchor="middle" fill="rgb(30,150,150)" font-family="-apple-system,system-ui,sans-serif" font-size="9">POST /inference</text>

  <!-- WissensNest.API -->
  <rect x="555" y="28" width="130" height="52" rx="7" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1.1"/>
  <text x="620" y="50" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">WissensNest.API</text>
  <text x="620" y="66" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">+ Ollama LLM</text>
  <text x="620" y="75" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">streaming SSE</text>

  <!-- Piper TTS -->
  <rect x="695" y="28" width="130" height="52" rx="7" fill="rgb(255,243,225)" stroke="rgb(180,95,20)" stroke-width="1.1"/>
  <text x="760" y="50" text-anchor="middle" fill="rgb(130,65,10)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Piper TTS</text>
  <text x="760" y="66" text-anchor="middle" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">HTTP :5002</text>
  <text x="760" y="75" text-anchor="middle" fill="rgb(200,110,30)" font-family="-apple-system,system-ui,sans-serif" font-size="9">POST /api/tts</text>

  <!-- ════════════ LIFELINES ════════════ -->
  <line x1="80" y1="80" x2="80" y2="490" stroke="rgba(80,80,75,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="210" y1="80" x2="210" y2="490" stroke="rgba(80,80,75,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="340" y1="80" x2="340" y2="490" stroke="rgba(80,80,75,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="480" y1="80" x2="480" y2="490" stroke="rgba(80,80,75,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="620" y1="80" x2="620" y2="490" stroke="rgba(80,80,75,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="760" y1="80" x2="760" y2="490" stroke="rgba(80,80,75,0.3)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ════════════ SEQUENCE STEPS ════════════ -->

  <!-- Step 1: User clicks mic button -->
  <text x="6" y="107" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">1</text>
  <rect x="28" y="97" width="104" height="22" rx="4" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.8"/>
  <text x="80" y="112" text-anchor="middle" fill="rgb(68,68,65)" font-family="-apple-system,system-ui,sans-serif" font-size="9">user clicks mic button</text>
  <!-- Browser → voice.js: startRecording() -->
  <line x1="80" y1="135" x2="210" y2="135" stroke="rgb(155,125,20)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="145" y="130" text-anchor="middle" fill="rgb(155,125,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">startRecording()</text>

  <!-- Step 2: MediaRecorder captures -->
  <text x="6" y="153" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">2</text>
  <rect x="150" y="145" width="120" height="18" rx="3" fill="rgb(255,251,220)" stroke="rgb(155,125,20)" stroke-width="0.7"/>
  <text x="210" y="157" text-anchor="middle" fill="rgb(100,80,10)" font-family="-apple-system,system-ui,sans-serif" font-size="9">recording... (WebM/Opus)</text>

  <!-- Step 3: user clicks stop -->
  <text x="6" y="186" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">3</text>
  <rect x="28" y="177" width="104" height="22" rx="4" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.8"/>
  <text x="80" y="192" text-anchor="middle" fill="rgb(68,68,65)" font-family="-apple-system,system-ui,sans-serif" font-size="9">user clicks stop</text>
  <!-- Browser → voice.js: stopRecording(), audio blob ready -->
  <line x1="80" y1="208" x2="210" y2="208" stroke="rgb(155,125,20)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="145" y="202" text-anchor="middle" fill="rgb(155,125,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">audio Blob ready</text>

  <!-- Step 4: voice.js → VoiceService (DotNet.invokeMethodAsync) -->
  <text x="6" y="232" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">4</text>
  <line x1="210" y1="226" x2="340" y2="226" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="275" y="220" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">InvokeMethodAsync(audioBytes)</text>

  <!-- Step 5: VoiceService → whisper.cpp HTTP POST -->
  <text x="6" y="255" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">5</text>
  <line x1="340" y1="250" x2="480" y2="250" stroke="rgb(20,130,130)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="410" y="244" text-anchor="middle" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">POST /inference (WAV bytes)</text>

  <!-- Step 6: whisper processes, returns transcript -->
  <text x="6" y="279" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">6</text>
  <rect x="425" y="260" width="110" height="18" rx="3" fill="rgb(220,245,245)" stroke="rgb(20,130,130)" stroke-width="0.7"/>
  <text x="480" y="272" text-anchor="middle" fill="rgb(10,90,90)" font-family="-apple-system,system-ui,sans-serif" font-size="9">inference... (Metal GPU)</text>
  <line x1="480" y1="295" x2="340" y2="295" stroke="rgb(20,130,130)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="410" y="289" text-anchor="middle" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">{ text: "Was ist die Hauptstadt..." }</text>

  <!-- Step 7: VoiceService → API: POST /chat/stream -->
  <text x="6" y="321" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">7</text>
  <line x1="340" y1="315" x2="620" y2="315" stroke="rgb(83,74,183)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="480" y="309" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">POST /chat/stream (ChatRequest)</text>

  <!-- Step 8: API → Ollama, streams back -->
  <text x="6" y="345" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">8</text>
  <rect x="560" y="335" width="120" height="18" rx="3" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.7"/>
  <text x="620" y="347" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Ollama inference + tools</text>
  <line x1="620" y1="362" x2="340" y2="362" stroke="rgb(83,74,183)" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <text x="480" y="356" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9">SSE stream: text tokens...</text>

  <!-- Step 9: VoiceService collects stream, sends full text to Piper -->
  <text x="6" y="390" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">9</text>
  <line x1="340" y1="382" x2="760" y2="382" stroke="rgb(180,95,20)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="550" y="376" text-anchor="middle" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">POST /api/tts (response text)</text>
  <rect x="710" y="390" width="100" height="18" rx="3" fill="rgb(255,243,225)" stroke="rgb(180,95,20)" stroke-width="0.7"/>
  <text x="760" y="402" text-anchor="middle" fill="rgb(130,65,10)" font-family="-apple-system,system-ui,sans-serif" font-size="9">synthesizing speech...</text>
  <line x1="760" y1="416" x2="340" y2="416" stroke="rgb(180,95,20)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="550" y="410" text-anchor="middle" fill="rgb(180,95,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">WAV bytes</text>

  <!-- Step 10: VoiceService → voice.js → AudioContext.play -->
  <text x="6" y="444" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">10</text>
  <line x1="340" y1="438" x2="210" y2="438" stroke="rgb(155,125,20)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="275" y="432" text-anchor="middle" fill="rgb(155,125,20)" font-family="-apple-system,system-ui,sans-serif" font-size="9">playAudio(wavBytes)</text>
  <line x1="210" y1="456" x2="80" y2="456" stroke="rgb(95,94,90)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="145" y="450" text-anchor="middle" fill="rgb(95,94,90)" font-family="-apple-system,system-ui,sans-serif" font-size="9">AudioContext.decodeAudioData()</text>

  <!-- Step 11: audio plays + chat bubble appears -->
  <rect x="28" y="466" width="165" height="18" rx="4" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.8"/>
  <text x="110" y="478" text-anchor="middle" fill="rgb(68,68,65)" font-family="-apple-system,system-ui,sans-serif" font-size="9">audio plays + chat bubble shown</text>
</svg>
