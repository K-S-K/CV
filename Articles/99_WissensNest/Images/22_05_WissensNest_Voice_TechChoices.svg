  <text x="560" y="192" text-anchor="middle" fill="rgb(100,100,95)" font-family="-apple-system,system-ui,sans-serif" font-size="10">NuGet: Vosk</text>
  <text x="670" y="192" text-anchor="middle" fill="rgb(100,100,95)" font-family="-apple-system,system-ui,sans-serif" font-size="10">real-time streaming STT</text>
  <text x="670" y="205" text-anchor="middle" fill="rgb(130,128,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9">lower accuracy on RU/DE</text>

