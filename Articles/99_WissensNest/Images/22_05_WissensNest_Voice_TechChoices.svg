<svg width="100%" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">

  <!-- Title -->
  <text x="430" y="18" text-anchor="middle" fill="rgb(35,35,33)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600">Voice Technology Choices — STT and TTS</text>
  <text x="430" y="32" text-anchor="middle" fill="rgb(120,120,115)" font-family="-apple-system,system-ui,sans-serif" font-size="10">All options run 100% locally · no cloud · C++/.NET preferred</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STT SECTION                                 -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="10" y="42" width="840" height="178" rx="10" fill="rgb(236,248,248)" stroke="rgb(20,130,130)" stroke-width="1" stroke-dasharray="6 3"/>
