  <text x="130" y="112" text-anchor="middle" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">C++ · HTTP server</text>
  <text x="270" y="105" text-anchor="middle" fill="rgb(10,90,90)" font-family="-apple-system,system-ui,sans-serif" font-size="10">99+ languages</text>
  <text x="370" y="101" text-anchor="middle" fill="rgb(10,90,90)" font-family="-apple-system,system-ui,sans-serif" font-size="10">★★★★★</text>
  <text x="370" y="114" text-anchor="middle" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">large-v3 model</text>
  <text x="460" y="101" text-anchor="middle" fill="rgb(10,90,90)" font-family="-apple-system,system-ui,sans-serif" font-size="10">~1–3 s</text>
  <text x="460" y="114" text-anchor="middle" fill="rgb(20,130,130)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Metal GPU</text>
  <text x="560" y="101" text-anchor="middle" fill="rgb(10,90,90)" font-family="-apple-system,system-ui,sans-serif" font-size="10">HTTP POST /inference</text>
