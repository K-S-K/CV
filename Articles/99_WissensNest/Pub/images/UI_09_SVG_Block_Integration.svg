  <rect x="500" y="424" width="380" height="48" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="690" y="439" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">+ SVG — inserts svgimg://guid at cursor</text>
  <text x="690" y="453" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Opens modal (Paste / Upload / Library); creates DB record</text>
  <text x="690" y="465" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Image appears in preview on Save</text>

