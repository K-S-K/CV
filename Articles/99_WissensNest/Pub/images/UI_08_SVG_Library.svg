<svg width="100%" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" fill="rgb(35,35,33)" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="600">WissensNest — SVG Library Page  (/svg-library)</text>

  <!-- Page frame -->
  <rect x="20" y="34" width="560" height="564" rx="10" fill="rgb(252,252,252)" stroke="rgb(210,210,210)" stroke-width="1.5"/>

  <!-- Page header -->
  <text x="40" y="64" fill="rgb(30,30,30)" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="700">SVG Library</text>
  <!-- Search bar -->
  <rect x="150" y="48" width="220" height="28" rx="6" fill="white" stroke="rgb(200,200,200)" stroke-width="1"/>
  <text x="163" y="66" fill="rgb(160,160,160)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Search by name, description…</text>
  <!-- Upload button -->
  <rect x="378" y="48" width="88" height="28" rx="6" fill="rgb(83,74,183)" stroke="rgb(62,57,160)" stroke-width="1"/>
  <text x="422" y="66" text-anchor="middle" fill="white" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="600">+ Upload New</text>
  <!-- Import ZIP -->
  <rect x="472" y="48" width="84" height="28" rx="6" fill="rgb(240,240,240)" stroke="rgb(200,200,200)" stroke-width="1"/>
  <text x="514" y="66" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Import ZIP</text>
  <!-- divider -->
  <line x1="30" y1="86" x2="570" y2="86" stroke="rgb(230,230,230)" stroke-width="1"/>

  <!-- ── Card 1 (top-left) ──────────────────────────────────────────────── -->
  <rect x="34" y="96" width="168" height="168" rx="8" fill="white" stroke="rgb(224,216,255)" stroke-width="1.5"/>
  <!-- thumbnail -->
  <rect x="44" y="106" width="148" height="92" rx="5" fill="rgb(248,247,255)" stroke="rgb(220,215,250)" stroke-width="1"/>
  <!-- simple diagram inside thumbnail -->
  <rect x="64" y="118" width="60" height="44" rx="5" fill="rgb(237,233,255)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="94" y="144" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">SoC</text>
  <rect x="136" y="118" width="46" height="44" rx="5" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/>
  <text x="159" y="144" text-anchor="middle" fill="rgb(15,110,86)" font-family="-apple-system,system-ui,sans-serif" font-size="9" font-weight="600">RAM</text>
  <line x1="124" y1="140" x2="136" y2="140" stroke="rgb(83,74,183)" stroke-width="1.5"/>
  <!-- name + desc -->
  <text x="52" y="214" fill="rgb(30,30,30)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Block diagram</text>
  <text x="52" y="228" fill="rgb(120,120,120)" font-family="-apple-system,system-ui,sans-serif" font-size="9">System overview</text>
  <!-- actions row -->
  <rect x="44" y="240" width="24" height="18" rx="4" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="56" y="252" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">✎</text>
  <rect x="72" y="240" width="24" height="18" rx="4" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="84" y="252" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">⬇</text>
  <rect x="100" y="240" width="24" height="18" rx="4" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="112" y="252" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">⟳</text>
  <rect x="152" y="240" width="24" height="18" rx="4" fill="rgb(255,240,240)" stroke="rgb(252,165,165)" stroke-width="1"/>
  <text x="164" y="252" text-anchor="middle" fill="rgb(180,50,50)" font-family="-apple-system,system-ui,sans-serif" font-size="10">✕</text>

  <!-- ── Card 2 (top-right) — with Where used expanded ───────────────────── -->
  <rect x="214" y="96" width="168" height="252" rx="8" fill="white" stroke="rgb(224,216,255)" stroke-width="1.5"/>
  <!-- thumbnail -->
  <rect x="224" y="106" width="148" height="92" rx="5" fill="rgb(248,247,255)" stroke="rgb(220,215,250)" stroke-width="1"/>
  <!-- flowchart inside thumbnail -->
  <rect x="270" y="118" width="56" height="24" rx="4" fill="rgb(237,233,255)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="298" y="133" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="8">Input</text>
  <line x1="298" y1="142" x2="298" y2="154" stroke="rgb(83,74,183)" stroke-width="1.5"/>
  <rect x="270" y="154" width="56" height="24" rx="4" fill="rgb(255,243,220)" stroke="rgb(160,85,10)" stroke-width="1"/>
  <text x="298" y="169" text-anchor="middle" fill="rgb(110,60,5)" font-family="-apple-system,system-ui,sans-serif" font-size="8">Process</text>
  <!-- name -->
  <text x="232" y="214" fill="rgb(30,30,30)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Flow chart</text>
  <!-- actions row -->
  <rect x="224" y="222" width="24" height="18" rx="4" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="236" y="234" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">✎</text>
  <rect x="252" y="222" width="24" height="18" rx="4" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="264" y="234" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">⬇</text>
  <rect x="280" y="222" width="24" height="18" rx="4" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="292" y="234" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">⟳</text>
  <rect x="332" y="222" width="24" height="18" rx="4" fill="rgb(255,240,240)" stroke="rgb(252,165,165)" stroke-width="1"/>
  <text x="344" y="234" text-anchor="middle" fill="rgb(180,50,50)" font-family="-apple-system,system-ui,sans-serif" font-size="10">✕</text>
  <!-- Where used button (expanded) -->
  <rect x="224" y="248" width="148" height="20" rx="3" fill="rgb(248,247,255)"/>
  <text x="232" y="261" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="600">▴ Where used  (2)</text>
  <!-- link items -->
  <rect x="224" y="272" width="148" height="28" rx="4" fill="rgb(250,249,255)" stroke="rgb(220,215,250)" stroke-width="1"/>
  <text x="232" y="282" fill="rgb(120,120,120)" font-family="-apple-system,system-ui,sans-serif" font-size="8">Notes › Architecture</text>
  <text x="232" y="294" fill="rgb(60,60,60)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Data pipeline overview…</text>
  <rect x="224" y="306" width="148" height="28" rx="4" fill="rgb(250,249,255)" stroke="rgb(220,215,250)" stroke-width="1"/>
  <text x="232" y="316" fill="rgb(120,120,120)" font-family="-apple-system,system-ui,sans-serif" font-size="8">Research › Design</text>
  <text x="232" y="328" fill="rgb(60,60,60)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Sequence diagram for…</text>
  <!-- top-right border -->
  <line x1="214" y1="344" x2="382" y2="344" stroke="rgb(220,215,250)" stroke-width="1"/>

  <!-- ── Card 3 (meta edit mode) ────────────────────────────────────────── -->
  <rect x="394" y="96" width="168" height="168" rx="8" fill="white" stroke="rgb(83,74,183)" stroke-width="2"/>
  <!-- thumbnail -->
  <rect x="404" y="106" width="148" height="68" rx="5" fill="rgb(248,247,255)" stroke="rgb(220,215,250)" stroke-width="1"/>
  <!-- pie chart inside thumbnail -->
  <circle cx="478" cy="140" r="24" fill="rgb(237,233,255)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <path d="M478,140 L478,116 A24,24 0 0,1 499,153 Z" fill="rgb(83,74,183)"/>
  <path d="M478,140 L499,153 A24,24 0 0,1 457,153 Z" fill="rgb(196,181,253)"/>
  <!-- editing name / description -->
  <rect x="404" y="182" width="148" height="22" rx="4" fill="rgb(252,252,255)" stroke="rgb(83,74,183)" stroke-width="1.5"/>
  <text x="412" y="196" fill="rgb(30,30,30)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Pie chart</text>
  <rect x="404" y="208" width="148" height="22" rx="4" fill="white" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="412" y="222" fill="rgb(140,140,140)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Description (optional)</text>
  <!-- save/cancel -->
  <rect x="404" y="236" width="60" height="20" rx="4" fill="rgb(83,74,183)" stroke="rgb(62,57,160)" stroke-width="1"/>
  <text x="434" y="249" text-anchor="middle" fill="white" font-family="-apple-system,system-ui,sans-serif" font-size="10">Save</text>
  <rect x="470" y="236" width="60" height="20" rx="4" fill="rgb(240,240,240)" stroke="rgb(200,200,200)" stroke-width="1"/>
  <text x="500" y="249" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Cancel</text>

  <!-- ── Annotation lines ───────────────────────────────────────────────── -->
  <!-- A: Search bar -->
  <line x1="260" y1="62" x2="660" y2="100" stroke="rgb(100,100,100)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="663" y="84" width="216" height="36" rx="6" fill="rgb(245,245,245)" stroke="rgb(160,160,160)" stroke-width="1"/>
  <text x="771" y="99" text-anchor="middle" fill="rgb(60,60,60)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Search bar</text>
  <text x="771" y="112" text-anchor="middle" fill="rgb(100,100,100)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Name, description, and block context</text>

  <!-- B: Card actions -->
  <line x1="202" y1="249" x2="658" y2="180" stroke="rgb(83,74,183)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="663" y="134" width="216" height="80" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="771" y="150" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Card action buttons</text>
  <text x="771" y="164" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">✎  Edit name / description</text>
  <text x="771" y="178" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">⬇  Download .svg file</text>
  <text x="771" y="192" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">⟳  Replace content  ✕ Delete</text>

  <!-- C: Where used -->
  <line x1="382" y1="302" x2="658" y2="280" stroke="rgb(83,74,183)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="663" y="240" width="216" height="60" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="771" y="256" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Where used — lazy loaded</text>
  <text x="771" y="270" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Click link → jump to that block</text>
  <text x="771" y="284" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">with scroll highlight</text>

  <!-- D: Meta edit -->
  <line x1="562" y1="213" x2="658" y2="340" stroke="rgb(83,74,183)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="663" y="320" width="216" height="48" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="771" y="336" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Inline meta edit mode</text>
  <text x="771" y="350" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Purple border = editing this card</text>

  <!-- E: Import ZIP -->
  <line x1="514" y1="62" x2="660" y2="388" stroke="rgb(160,85,10)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="663" y="376" width="216" height="48" rx="6" fill="rgb(255,243,220)" stroke="rgb(160,85,10)" stroke-width="1"/>
  <text x="771" y="392" text-anchor="middle" fill="rgb(110,60,5)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Import ZIP</text>
  <text x="771" y="406" text-anchor="middle" fill="rgb(180,100,20)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Batch-import multiple .svg files</text>

  <!-- ── Navigation hint ────────────────────────────────────────────────── -->
  <rect x="30" y="440" width="552" height="46" rx="6" fill="rgb(248,247,255)" stroke="rgb(196,181,253)" stroke-width="1"/>
  <text x="40" y="456" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="600">How to open this page</text>
  <text x="40" y="472" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Click the  ⬡ Images  tab in the sidebar (4th tab, after Projects / Prompts / Profiles)</text>

  <!-- ── Legend ─────────────────────────────────────────────────────────── -->
  <rect x="20" y="598" width="860" height="18" rx="4" fill="rgb(251,251,248)" stroke="rgba(40,40,38,0.10)" stroke-width="1"/>
  <rect x="28" y="602" width="10" height="10" rx="2" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="44" y="611" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Interactive / edit</text>
  <rect x="160" y="602" width="10" height="10" rx="2" fill="rgb(255,243,220)" stroke="rgb(160,85,10)" stroke-width="1"/>
  <text x="176" y="611" fill="rgb(110,60,5)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Add / import action</text>
  <text x="620" y="611" text-anchor="middle" fill="rgb(100,100,100)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Replace (⟳) updates the image in-place — all blocks referencing it see the new version immediately.</text>
</svg>
