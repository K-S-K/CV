<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="-apple-system,system-ui,sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#f4f6f9" rx="10"/>
  <text x="440" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">
    WissensNest — Message Bubble States and Toolbars
  </text>

  <!-- ═══════════════════════════════════════════════════════════
       LEFT COLUMN — User messages
  ═══════════════════════════════════════════════════════════════ -->
  <text x="220" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#4c1d95">
    User messages
  </text>

  <!-- 1. Normal user bubble -->
  <text x="30" y="72" font-size="9" font-weight="600" fill="#6b7280">Normal</text>
  <!-- toolbar (hover) -->
  <rect x="30" y="78" width="380" height="22" rx="3" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="230" y="93" text-anchor="end" font-size="9" fill="#5b21b6">✎ Edit</text>
  <text x="258" y="93" font-size="9" fill="#5b21b6">🚫 Ignore</text>
  <text x="318" y="93" font-size="9" fill="#5b21b6">→ Block</text>
  <text x="373" y="93" font-size="9" fill="#5b21b6">🔗 Link</text>
  <!-- bubble -->
  <rect x="30" y="102" width="380" height="44" rx="8" fill="rgb(237,233,254)" stroke="rgb(196,181,253)" stroke-width="1"/>
  <text x="220" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="rgb(76,29,149)">User</text>
  <text x="220" y="138" text-anchor="middle" font-size="10" fill="rgb(76,29,149)">How do I export a block to PDF?</text>

  <!-- 2. Ignored user bubble -->
  <text x="30" y="166" font-size="9" font-weight="600" fill="#6b7280">Ignored (excluded from model context)</text>
  <!-- toolbar -->
  <rect x="30" y="172" width="380" height="22" rx="3" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="316" y="187" text-anchor="end" font-size="9" fill="#5b21b6">✓ Restore</text>
  <!-- bubble dimmed -->
  <rect x="30" y="196" width="380" height="44" rx="8" fill="rgb(237,233,254)" stroke="rgb(196,181,253)"
        stroke-width="1" opacity="0.4"/>
  <text x="220" y="216" text-anchor="middle" font-size="10" fill="rgb(76,29,149)" opacity="0.4">
    (ignored — not sent to model)
  </text>
  <text x="220" y="232" text-anchor="middle" font-size="10" fill="rgb(76,29,149)" opacity="0.4">
    How do I export a block to PDF?
  </text>

  <!-- ═══════════════════════════════════════════════════════════
       RIGHT COLUMN — Assistant messages
  ═══════════════════════════════════════════════════════════════ -->
  <text x="660" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">
    Assistant messages
  </text>

  <!-- 3. Normal assistant bubble -->
  <text x="470" y="72" font-size="9" font-weight="600" fill="#6b7280">Normal</text>
  <!-- toolbar -->
  <rect x="470" y="78" width="380" height="22" rx="3" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="480" y="93" font-size="9" fill="#065f46">Md</text>
  <text x="506" y="93" font-size="9" fill="#065f46">Raw</text>
  <text x="538" y="93" font-size="9" fill="#065f46">👁 Activity</text>
  <text x="620" y="93" font-size="9" fill="#065f46">🚫 Ignore</text>
  <!-- bubble -->
  <rect x="470" y="102" width="380" height="44" rx="8" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="660" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Assistant</text>
  <text x="660" y="138" text-anchor="middle" font-size="10" fill="#065f46">Go to Export mode, check blocks, click PDF.</text>

  <!-- 4. Stale assistant bubble -->
  <text x="470" y="166" font-size="9" font-weight="600" fill="#6b7280">Stale (user message was edited)</text>
  <!-- toolbar with Regenerate -->
  <rect x="470" y="172" width="380" height="22" rx="3" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="480" y="187" font-size="9" fill="#92400e">Md</text>
  <text x="506" y="93" font-size="9" fill="#065f46">Raw</text>
  <rect x="620" y="175" width="72" height="16" rx="3" fill="#f59e0b"/>
  <text x="656" y="187" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Regenerate</text>
  <!-- bubble with amber left border -->
  <rect x="470" y="196" width="6" height="50" rx="3" fill="#f59e0b"/>
  <rect x="476" y="196" width="374" height="50" rx="0 8 8 0" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <rect x="474" y="196" width="376" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="660" y="209" text-anchor="middle" font-size="8" fill="#92400e" font-style="italic">outdated</text>
  <text x="660" y="225" text-anchor="middle" font-size="10" fill="#92400e">Go to Export mode… (now outdated)</text>
  <text x="660" y="239" text-anchor="middle" font-size="10" fill="#92400e">Click Regenerate to get a fresh answer.</text>

  <!-- 5. Streaming assistant bubble -->
  <text x="30" y="266" font-size="9" font-weight="600" fill="#6b7280">Streaming (in progress) — no toolbar yet</text>
  <rect x="30" y="278" width="380" height="52" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="40" y="296" font-size="10" font-weight="600" fill="#92400e">Assistant  (streaming…)</text>
  <text x="40" y="312" font-size="10" fill="#92400e">Go to the Article Editor, click Export</text>
  <text x="40" y="326" font-size="10" fill="#92400e">in the header, then…  |</text>
  <!-- tool activity -->
  <rect x="30" y="336" width="230" height="16" rx="3" fill="#f5f3ff" stroke="rgb(124,58,237)" stroke-width="1"/>
  <text x="38" y="348" font-size="8" fill="rgb(91,33,182)">▸ fetch_page  "questpdf.com"  18 ms</text>

  <!-- 6. Ignored assistant bubble -->
  <text x="470" y="266" font-size="9" font-weight="600" fill="#6b7280">Ignored assistant</text>
  <!-- toolbar -->
  <rect x="470" y="272" width="380" height="22" rx="3" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1"/>
  <text x="780" y="287" text-anchor="end" font-size="9" fill="#065f46">✓ Restore</text>
  <!-- bubble dimmed -->
  <rect x="470" y="296" width="380" height="44" rx="8" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1" opacity="0.4"/>
  <text x="660" y="316" text-anchor="middle" font-size="10" fill="#065f46" opacity="0.4">(ignored — not sent to model)</text>
  <text x="660" y="332" text-anchor="middle" font-size="10" fill="#065f46" opacity="0.4">Go to Export mode… (excluded)</text>

  <!-- ── Callout annotations ─────────────────────────────── -->

  <!-- Toolbar annotation -->
  <line x1="220" y1="76" x2="220" y2="56" stroke="rgb(115,114,108)" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="220" y="52" text-anchor="middle" font-size="9" fill="#374151">toolbar appears on hover</text>

  <!-- Stale amber border -->
  <line x1="462" y1="218" x2="430" y2="218" stroke="rgb(115,114,108)" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="370" y="222" text-anchor="middle" font-size="9" fill="#374151">amber left border</text>

  <!-- Streaming amber bg -->
  <line x1="220" y1="276" x2="220" y2="258" stroke="rgb(115,114,108)" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="220" y="254" text-anchor="middle" font-size="9" fill="#374151">amber = in progress</text>

  <!-- ── Legend ─────────────────────────────────────────────── -->
  <rect x="20" y="396" width="840" height="32" rx="5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="32" y="406" width="14" height="12" rx="2" fill="rgb(237,233,254)" stroke="rgb(196,181,253)" stroke-width="1"/>
  <text x="52" y="416" font-size="9" fill="#4c1d95">User message</text>
  <rect x="140" y="406" width="14" height="12" rx="2" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="160" y="416" font-size="9" fill="#065f46">Assistant (complete)</text>
  <rect x="290" y="406" width="14" height="12" rx="2" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="310" y="416" font-size="9" fill="#92400e">Stale / streaming</text>
  <text x="450" y="416" font-size="9" fill="#6b7280">Opacity 0.4 = ignored (excluded from model context, still visible to restore)</text>

</svg>
