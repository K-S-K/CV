<svg width="100%" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" fill="rgb(35,35,33)" font-family="-apple-system,system-ui,sans-serif" font-size="15" font-weight="600">WissensNest — Insert SVG Modal</text>

  <!-- Modal frame -->
  <rect x="60" y="34" width="590" height="506" rx="10" fill="rgb(252,252,252)" stroke="rgb(210,210,210)" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="34" width="590" height="42" rx="10" fill="rgb(248,247,255)" stroke="rgb(200,195,240)" stroke-width="1"/>
  <rect x="60" y="54" width="590" height="22" fill="rgb(248,247,255)"/>
  <line x1="60" y1="76" x2="650" y2="76" stroke="rgb(220,215,250)" stroke-width="1"/>
  <text x="86" y="60" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600">Insert SVG</text>
  <!-- close button -->
  <rect x="614" y="42" width="26" height="22" rx="5" fill="rgb(245,245,245)" stroke="rgb(210,210,210)" stroke-width="1"/>
  <text x="627" y="57" text-anchor="middle" fill="rgb(100,100,100)" font-family="-apple-system,system-ui,sans-serif" font-size="12">✕</text>

  <!-- Tabs -->
  <line x1="60" y1="112" x2="650" y2="112" stroke="rgb(220,215,250)" stroke-width="1"/>
  <!-- Paste XML tab (active) -->
  <rect x="60" y="76" width="197" height="36" fill="rgb(252,252,252)"/>
  <text x="158" y="99" text-anchor="middle" fill="rgb(83,74,183)" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">Paste XML</text>
  <line x1="60" y1="112" x2="257" y2="112" stroke="rgb(83,74,183)" stroke-width="2.5"/>
  <!-- Upload File tab -->
  <rect x="257" y="76" width="197" height="36" fill="rgb(252,252,252)"/>
  <text x="355" y="99" text-anchor="middle" fill="rgb(140,130,200)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Upload File</text>
  <!-- Library tab -->
  <rect x="454" y="76" width="196" height="36" fill="rgb(252,252,252)"/>
  <text x="552" y="99" text-anchor="middle" fill="rgb(140,130,200)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Library</text>
  <!-- tab dividers -->
  <line x1="257" y1="80" x2="257" y2="108" stroke="rgb(220,215,250)" stroke-width="1"/>
  <line x1="454" y1="80" x2="454" y2="108" stroke="rgb(220,215,250)" stroke-width="1"/>

  <!-- Body -->
  <!-- XML textarea label hint -->
  <text x="76" y="130" fill="rgb(120,110,180)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Paste SVG XML here…</text>
  <!-- Textarea -->
  <rect x="70" y="118" width="570" height="148" rx="5" fill="rgb(252,252,255)" stroke="rgb(83,74,183)" stroke-width="1.5"/>
  <text x="82" y="140" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">&lt;svg xmlns="http://www.w3.org/2000/svg"</text>
  <text x="82" y="156" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">     width="240" height="200" viewBox="0 0 240 200"&gt;</text>
  <text x="82" y="172" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">  &lt;rect x="20" y="20" width="200" height="160"</text>
  <text x="82" y="188" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">        rx="12" fill="#ede9ff" stroke="#534AB7"/&gt;</text>
  <text x="82" y="204" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">  &lt;circle cx="120" cy="100" r="55" fill="#534AB7" opacity=".8"/&gt;</text>
  <text x="82" y="220" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">  &lt;text x="120" y="106" text-anchor="middle"</text>
  <text x="82" y="236" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">        fill="white" font-size="18"&gt;AI&lt;/text&gt;</text>
  <text x="82" y="252" fill="rgb(60,52,120)" font-family="'Courier New',monospace" font-size="10">&lt;/svg&gt;</text>
  <!-- cursor -->
  <rect x="82" y="254" width="1.5" height="12" fill="rgb(83,74,183)"/>

  <!-- Name / Description fields -->
  <rect x="70" y="278" width="278" height="28" rx="5" fill="white" stroke="rgb(200,200,200)" stroke-width="1"/>
  <text x="82" y="296" fill="rgb(140,140,140)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Name (optional)</text>
  <rect x="360" y="278" width="280" height="28" rx="5" fill="white" stroke="rgb(200,200,200)" stroke-width="1"/>
  <text x="372" y="296" fill="rgb(140,140,140)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Description (optional)</text>

  <!-- Live preview label -->
  <text x="76" y="324" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="600">Preview</text>
  <!-- Preview box -->
  <rect x="70" y="328" width="570" height="140" rx="5" fill="white" stroke="rgb(220,215,250)" stroke-width="1"/>
  <!-- Sample SVG inside preview -->
  <rect x="195" y="340" width="160" height="116" rx="8" fill="rgb(237,233,255)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <circle cx="275" cy="398" r="38" fill="rgb(83,74,183)" opacity=".85"/>
  <text x="275" y="405" text-anchor="middle" fill="white" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="700">AI</text>

  <!-- Footer -->
  <line x1="60" y1="480" x2="650" y2="480" stroke="rgb(220,215,250)" stroke-width="1"/>
  <rect x="60" y="480" width="590" height="60" rx="10" fill="rgb(248,247,255)"/>
  <rect x="60" y="480" width="590" height="30" fill="rgb(248,247,255)"/>
  <!-- Insert button -->
  <rect x="76" y="492" width="96" height="30" rx="6" fill="rgb(83,74,183)" stroke="rgb(62,57,160)" stroke-width="1"/>
  <text x="124" y="511" text-anchor="middle" fill="white" font-family="-apple-system,system-ui,sans-serif" font-size="12" font-weight="600">Insert</text>
  <!-- Cancel button -->
  <rect x="182" y="492" width="72" height="30" rx="6" fill="rgb(240,240,240)" stroke="rgb(200,200,200)" stroke-width="1"/>
  <text x="218" y="511" text-anchor="middle" fill="rgb(80,80,80)" font-family="-apple-system,system-ui,sans-serif" font-size="12">Cancel</text>

  <!-- ── Annotations ───────────────────────────────────────────────────── -->
  <!-- A: Tabs -->
  <line x1="355" y1="94" x2="690" y2="94" stroke="rgb(83,74,183)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="693" y="76" width="196" height="36" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="791" y="91" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Three input tabs</text>
  <text x="791" y="105" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Paste XML / Upload File / Library</text>

  <!-- B: Textarea -->
  <line x1="652" y1="190" x2="688" y2="190" stroke="rgb(83,74,183)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="693" y="172" width="196" height="36" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="791" y="187" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Paste raw SVG XML here</text>
  <text x="791" y="200" text-anchor="middle" fill="rgb(100,90,200)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Content is validated before save</text>

  <!-- C: Name field -->
  <line x1="350" y1="292" x2="688" y2="292" stroke="rgb(100,100,100)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="693" y="278" width="196" height="28" rx="6" fill="rgb(245,245,245)" stroke="rgb(160,160,160)" stroke-width="1"/>
  <text x="791" y="296" text-anchor="middle" fill="rgb(60,60,60)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Name + description (optional)</text>

  <!-- D: Preview -->
  <line x1="652" y1="398" x2="688" y2="398" stroke="rgb(15,110,86)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="693" y="380" width="196" height="36" rx="6" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/>
  <text x="791" y="395" text-anchor="middle" fill="rgb(8,80,65)" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600">Live SVG preview</text>
  <text x="791" y="408" text-anchor="middle" fill="rgb(20,130,100)" font-family="-apple-system,system-ui,sans-serif" font-size="10">Updates as you type or load a file</text>

  <!-- E: Insert button -->
  <line x1="172" y1="507" x2="688" y2="507" stroke="rgb(83,74,183)" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="693" y="492" width="196" height="30" rx="6" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="791" y="510" text-anchor="middle" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="11">Insert at cursor; saved to library</text>

  <!-- ── Legend ─────────────────────────────────────────────────────────── -->
  <rect x="60" y="556" width="830" height="18" rx="4" fill="rgb(251,251,248)" stroke="rgba(40,40,38,0.10)" stroke-width="1"/>
  <rect x="68" y="560" width="10" height="10" rx="2" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="84" y="569" fill="rgb(60,52,137)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Interactive / modal</text>
  <rect x="220" y="560" width="10" height="10" rx="2" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/>
  <text x="236" y="569" fill="rgb(8,80,65)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Preview (rendered)</text>
  <text x="600" y="569" text-anchor="middle" fill="rgb(100,100,100)" font-family="-apple-system,system-ui,sans-serif" font-size="9">Library tab lets you pick an existing image without creating a duplicate.</text>
</svg>
